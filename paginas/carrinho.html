<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Ícones do Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="/css/carrinho.css">
  <link rel="stylesheet" href="/css/navbar.css">
</head>

<body>
  <!-- ====== Navbar ====== -->
  <nav class="navbar navbar-expand-lg navbar-dark py-2">
    <div class="container d-flex justify-content-between align-items-center">
      <!-- Logo -->
      <a class="navbar-brand fw-bold fs-4 text-white" href="/">
        <img src="/logo-matrip-oficial-01.png" alt="Matrip" style="height:70px; margin-right:8px; vertical-align:middle;">
        <span class="slogan">Seu guia de experiências turísticas</span>
      </a>

      <!-- Ambiente seguro -->
      <div class="secure-area">
        <i class="bi bi-shield-check"></i>
        <small>ambiente <span>100% seguro</span></small>
      </div>
    </div>
  </nav>

  <!-- ====== Cabeçalho ====== -->
  <header class="cart-header">
    <h2><i class="bi bi-cart4"></i> Carrinho - Matrip</h2>
  </header>

  <!-- ====== Conteúdo principal ====== -->
  <div class="container my-5">
    <div class="row g-4">

      <!-- Itens do Carrinho (dinâmico) -->
      <div class="col-lg-8">
        <div id="cartItems"></div>
      </div>

      <!-- ====== Resumo ====== -->
      <div class="col-lg-4">
        <div class="summary-box">
          <h5 class="mb-3">Resumo do Pedido</h5>

          <!-- Campo de cupom (visual) -->
          <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="Código do cupom" aria-label="Código do cupom">
            <button class="btn btn-outline-success" type="button">Aplicar</button>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <strong id="subtotalValue">R$ 0,00</strong>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Taxas</span>
            <strong id="taxasValue">R$ 0,00</strong>
          </div>

          <hr>

          <div class="d-flex justify-content-between mb-3">
            <h5>Total</h5>
            <h5 class="text-success" id="totalValue">R$ 0,00</h5>
          </div>

          <a href="/paginas/checkout.html" class="btn btn-checkout w-100">
            Finalizar Compra
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Seu carrinho (ES Module) -->
  <script type="module" src="/js/carrinho.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrip — Cadastrar Passeio</title>

  <!-- CSS DA NAVBAR -->
  <link rel="stylesheet" href="/css/navbar.css">

  <!-- CSS DA PÁGINA -->
  <link rel="stylesheet" href="/css/passeio.css">
</head>
<body>

  <!-- ================= NAVBAR ================= -->
  <header>
    <div class="container">

      <!-- LOGO + SLOGAN -->
      <a href="/index.html" class="logo">
        <img src="/logo-matrip-oficial-01.png" alt="Logo Matrip">
        <span class="slogan">Seu guia de experiências turísticas</span>
      </a>

      <!-- AÇÕES -->
      <div class="actions">

        <!-- Idioma -->
        <button class="lang" aria-label="Idioma: Português (Brasil)">
          <img src="/img/br.svg" alt="Bandeira do Brasil">
        </button>

        <span class="sep"></span>

        <!-- Conta -->
        <a href="#" class="account">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.239-8 5v1h16v-1c0-2.761-3.58-5-8-5Z"/>
          </svg>
          <span>Minha Conta</span>
        </a>

        <!-- Carrinho -->
        <a href="/paginas/carrinho.html" class="cart">
          <svg class="icon" viewBox="0 0 24 24">
            <path d="M7 18a2 2 0 1 0 2 2a2 2 0 0 0-2-2Zm10 0a2 2 0 1 0 2 2a2 2 0 0 0-2-2ZM6.2 6l.8 2h10l1.8-5H5.21l-.94-2H0v2h3l3.6 7.59L5.25 14A2 2 0 0 0 7 17h12v-2H7.42a.25.25 0 0 1-.25-.25l.03-.12L8.1 13h8.45a2 2 0 0 0 1.9-1.37l2.76-7.63L20.16 3H5.21Z"/>
          </svg>
        </a>

      </div>
    </div>
  </header>

  <!-- ================= CONTEÚDO ================= -->
  <main class="passeio-page">
    <div class="passeio-wrapper">
      <div class="passeio-card">

        <!-- TÍTULO -->
        <div class="passeio-header">
          <h1>Cadastrar Novo Passeio</h1>
          <p>Preencha as informações básicas do passeio turístico.</p>
        </div>

        <!-- FORMULÁRIO -->
        <form class="passeio-form">

          <!-- CATEGORIA (PÍLULAS) -->
          <div class="passeio-field">
            <label>Categoria</label>

            <div class="passeio-categorias-pill">

              <label class="categoria-pill">
                <input type="radio" name="categoria" value="passeios" required>
                <span>Passeios</span>
              </label>

              <label class="categoria-pill">
                <input type="radio" name="categoria" value="aventuras">
                <span>Aventuras</span>
              </label>

              <label class="categoria-pill">
                <input type="radio" name="categoria" value="culinaria">
                <span>Culinária</span>
              </label>

              <label class="categoria-pill">
                <input type="radio" name="categoria" value="cultural">
                <span>Cultural</span>
              </label>

            </div>
          </div>

          <!-- LOCAL -->
          <div class="passeio-field">
            <label>Local do passeio</label>
            <input type="text" placeholder="Ex: Centro Histórico" required>
          </div>

          <!-- DESCRIÇÃO -->
          <div class="passeio-field">
            <label>Descrição breve</label>
            <textarea placeholder="Descreva o passeio" required></textarea>
          </div>

          <!-- VALORES -->
          <div class="passeio-grid">

            <div class="passeio-field">
              <label>Valor Adulto (R$) <small>(opcional)</small></label>
              <input type="number" step="0.01">
            </div>

            <div class="passeio-field">
              <label>Valor Estudante (R$) <small>(opcional)</small></label>
              <input type="number" step="0.01">
            </div>

            <div class="passeio-field">
              <label>Valor Criança (R$) <small>(opcional)</small></label>
              <input type="number" step="0.01">
            </div>

          </div>

          <!-- VALOR FINAL -->
          <div class="passeio-field">
            <label>Valor final do passeio (R$)</label>
            <input type="number" step="0.01" required>
          </div>

          <!-- IMAGENS -->
          <div class="passeio-field">
            <label>Imagens do passeio</label>
            <input type="file" multiple accept="image/*">
            <small>Você pode selecionar várias imagens</small>
          </div>

          <!-- BOTÃO -->
          <button type="submit" class="passeio-btn">
            Salvar Passeio
          </button>

        </form>

      </div>
    </div>
  </main>

</body>
</html>
